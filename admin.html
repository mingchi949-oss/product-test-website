<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - MING Coffee</title>
    <link rel="stylesheet" href="./webstyle.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .admin-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      
      .admin-header {
        text-align: center;
        margin-bottom: 40px;
        padding: 30px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 255, 204, 0.2);
        border-radius: 20px;
        backdrop-filter: blur(10px);
      }
      
      .admin-header h1 {
        color: var(--accent);
        font-size: 2.5rem;
        margin-bottom: 10px;
      }
      
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
      
      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 255, 204, 0.2);
        border-radius: 16px;
        padding: 25px;
        text-align: center;
        transition: all 0.3s ease;
      }
      
      .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
        border-color: var(--accent);
      }
      
      .stat-card i {
        font-size: 2.5rem;
        color: var(--accent);
        margin-bottom: 15px;
      }
      
      .stat-card h3 {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      
      .stat-card .stat-value {
        color: #fff;
        font-size: 2rem;
        font-weight: 900;
      }
      
      .orders-section {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 255, 204, 0.2);
        border-radius: 20px;
        padding: 30px;
        backdrop-filter: blur(10px);
      }
      
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        flex-wrap: wrap;
        gap: 15px;
      }
      
      .section-header h2 {
        color: var(--accent);
        font-size: 1.8rem;
      }
      
      .filter-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      
      .filter-btn {
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #fff;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
      }
      
      .filter-btn:hover {
        background: rgba(0, 255, 204, 0.1);
        border-color: var(--accent);
      }
      
      .filter-btn.active {
        background: var(--accent);
        color: #000;
        border-color: var(--accent);
      }
      
      .orders-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      
      .order-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 20px;
        transition: all 0.3s ease;
      }
      
      .order-card:hover {
        border-color: var(--accent);
        box-shadow: 0 5px 20px rgba(0, 255, 204, 0.1);
      }
      
      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        flex-wrap: wrap;
        gap: 10px;
      }
      
      .order-number {
        color: var(--accent);
        font-size: 1.2rem;
        font-weight: 700;
      }
      
      .order-status {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
      }
      
      .status-pending {
        background: rgba(255, 193, 7, 0.2);
        color: #ffc107;
        border: 1px solid rgba(255, 193, 7, 0.3);
      }
      
      .status-confirmed {
        background: rgba(0, 255, 204, 0.2);
        color: var(--accent);
        border: 1px solid rgba(0, 255, 204, 0.3);
      }
      
      .status-preparing {
        background: rgba(33, 150, 243, 0.2);
        color: #2196f3;
        border: 1px solid rgba(33, 150, 243, 0.3);
      }
      
      .status-ready {
        background: rgba(156, 39, 176, 0.2);
        color: #e040fb;
        border: 1px solid rgba(156, 39, 176, 0.3);
      }
      
      .status-completed {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }
      
      .status-cancelled {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
        border: 1px solid rgba(244, 67, 54, 0.3);
      }
      
      .order-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
        margin-bottom: 15px;
      }
      
      .order-detail {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
      }
      
      .order-detail i {
        color: var(--accent);
        margin-right: 8px;
        width: 16px;
      }
      
      .order-items {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 15px;
      }
      
      .order-item {
        color: rgba(255, 255, 255, 0.8);
        padding: 5px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .order-item:last-child {
        border-bottom: none;
      }
      
      .order-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      
      .order-total {
        color: var(--accent);
        font-size: 1.3rem;
        font-weight: 700;
      }
      
      .order-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      
      .action-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        font-size: 0.85rem;
      }
      
      .btn-confirm {
        background: var(--accent);
        color: #000;
      }
      
      .btn-confirm:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
      }
      
      .btn-preparing {
        background: #2196f3;
        color: #fff;
      }
      
      .btn-preparing:hover {
        background: #1976d2;
      }
      
      .btn-ready {
        background: #e040fb;
        color: #fff;
      }
      
      .btn-ready:hover {
        background: #9c27b0;
      }
      
      .btn-complete {
        background: #4caf50;
        color: #fff;
      }
      
      .btn-complete:hover {
        background: #388e3c;
      }
      
      .btn-cancel {
        background: #f44336;
        color: #fff;
      }
      
      .btn-cancel:hover {
        background: #d32f2f;
      }
      
      .no-orders {
        text-align: center;
        padding: 60px 20px;
        color: rgba(255, 255, 255, 0.5);
      }
      
      .no-orders i {
        font-size: 4rem;
        margin-bottom: 20px;
        display: block;
      }
      
      .refresh-btn {
        padding: 10px 20px;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .refresh-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
      }
      
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--accent);
      }
      
      @media (max-width: 768px) {
        .admin-header h1 {
          font-size: 1.8rem;
        }
        
        .section-header {
          flex-direction: column;
          align-items: flex-start;
        }
        
        .order-header {
          flex-direction: column;
          align-items: flex-start;
        }
        
        .order-footer {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated Background Particles -->
    <div class="particles" id="particles"></div>

    <div class="admin-container">
      <!-- Admin Header -->
      <div class="admin-header">
        <h1><i class="fas fa-cog"></i> Admin Panel</h1>
        <p style="color: rgba(255,255,255,0.7);">MING Coffee Order Management System</p>
      </div>

      <!-- Statistics -->
      <div class="stats-grid">
        <div class="stat-card">
          <i class="fas fa-shopping-bag"></i>
          <h3>Total Orders</h3>
          <div class="stat-value" id="total-orders">0</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-calendar-day"></i>
          <h3>Today's Orders</h3>
          <div class="stat-value" id="today-orders">0</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-dollar-sign"></i>
          <h3>Total Revenue</h3>
          <div class="stat-value" id="total-revenue">$0</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-clock"></i>
          <h3>Pending Orders</h3>
          <div class="stat-value" id="pending-orders">0</div>
        </div>
      </div>

      <!-- Orders Section -->
      <div class="orders-section">
        <div class="section-header">
          <h2><i class="fas fa-list"></i> Orders</h2>
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="confirmed">Confirmed</button>
            <button class="filter-btn" data-filter="preparing">Preparing</button>
            <button class="filter-btn" data-filter="ready">Ready</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="refresh-btn" onclick="loadOrders()">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
          </div>
        </div>

        <div id="orders-list" class="orders-list">
          <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading orders...</p>
          </div>
        </div>
      </div>
    </div>

    <script src="./admin.js"></script>
  </body>
</html>
